<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{FULL_NAME}} — Resume</title>
<style>
  /* ─── International Resume — industry-standard, achievement-oriented ─── */
  :root {
    --ink:     #0a0a0a;
    --accent:  #1f4e79;
    --sub:     #2e75b6;
    --muted:   #505a60;
    --rule:    #b8c8d8;
    --bg:      #fff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Calibri', 'Arial', sans-serif;
    font-size: 10pt;
    color: var(--ink);
    background: var(--bg);
    max-width: 720px;
    margin: 40px auto;
    padding: 0 32px;
    line-height: 1.4;
  }

  /* ── Header ── */
  .ir-header { margin-bottom: 16px; }
  .ir-header h1 {
    font-size: 22pt;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.3px;
    margin-bottom: 2px;
  }
  .ir-headline {
    font-size: 11.5pt;
    color: var(--sub);
    font-weight: 400;
    margin-bottom: 5px;
  }
  .ir-contact {
    font-size: 9pt;
    color: var(--muted);
    border-top: 2px solid var(--accent);
    padding-top: 5px;
    margin-top: 5px;
  }
  /* ── Section headings ── */
  h2 {
    font-size: 10.5pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    border-bottom: 1.5px solid var(--accent);
    padding-bottom: 2px;
    margin: 18px 0 9px;
  }

  /* ── Summary ── */
  .ir-summary { font-size: 10pt; line-height: 1.65; color: #222; }

  /* ── Experience entries ── */
  .ir-entry { margin-bottom: 12px; }
  .ir-entry-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 2px;
  }
  .ir-role  { font-weight: 700; font-size: 10.5pt; color: var(--ink); }
  .ir-sep   { color: var(--rule); margin: 0 3px; }
  .ir-org   { font-size: 10pt; color: var(--sub); }
  .ir-dates { font-size: 9pt; color: var(--muted); white-space: nowrap; }
  .ir-bullets {
    list-style: disc;
    padding-left: 18px;
    margin-top: 3px;
  }
  .ir-bullets li {
    font-size: 9.5pt;
    color: #333;
    line-height: 1.55;
    margin-bottom: 2px;
  }

  /* ── Education ── */
  .cv-entry { margin-bottom: 9px; }
  .cv-entry-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 4px;
  }
  .cv-institution { font-weight: 700; font-size: 10.5pt; }
  .cv-dates       { font-size: 9pt; color: var(--muted); white-space: nowrap; }
  .cv-degree      { font-size: 10pt; color: var(--sub); }
  .cv-location    { font-size: 9pt; color: var(--muted); }

  /* ── Technical Skills ── */
  .ir-skills-row { margin-bottom: 5px; }
  .ir-skill-tag {
    display: inline-block;
    background: #eaf1fb;
    border: 1px solid #b8d0eb;
    border-radius: 3px;
    padding: 2px 9px;
    font-size: 9pt;
    color: var(--accent);
    margin: 2px 3px 2px 0;
  }

  /* ── Projects ── */
  .ir-skills-group { margin-bottom: 6px; }
  .ir-skills-label { font-weight: 700; font-size: 9pt; color: var(--accent); margin-right: 4px; }

  /* ── Certifications & Languages ── */
  .ir-cert-row  { font-size: 9.5pt; color: #333; margin-bottom: 5px; }
  .ir-langs-row { font-size: 9.5pt; color: #333; margin-top: 7px; }
  .ir-lang-item { white-space: nowrap; }

  .cv-empty { font-size: 9pt; color: #aaa; font-style: italic; }

  /* ── Footer ── */
  .footer {
    font-size: 8pt;
    color: #bbb;
    text-align: center;
    margin-top: 28px;
    padding-top: 8px;
    border-top: 1px solid #ddd;
  }

  .ir-entry { page-break-inside: avoid; }
  .cv-entry { page-break-inside: avoid; }
  @media print {
    @page { size: A4; margin: 16mm 20mm; }
    body { margin: 0; padding: 0; max-width: 100%; }
  }
</style>
</head>
<body>

<div class="ir-header">
  <h1>{{FULL_NAME}}</h1>
  <div class="ir-headline">{{HEADLINE}}</div>
  <div class="ir-contact">{{CONTACT_PIPE}}</div>
</div>

<h2>Professional Summary</h2>
<p class="ir-summary">{{SUMMARY}}</p>

<h2>Education</h2>
{{EDUCATION}}

<h2>Experience</h2>
{{EXPERIENCE_BULLETS}}

<h2>Technical Skills</h2>
{{SKILLS_GROUPED}}

<h2>Projects</h2>
{{PROJECTS_IR}}

<h2>Certifications &amp; Languages</h2>
{{CERTS_AND_LANGS}}

<div class="footer">{{FULL_NAME}} &mdash; {{YEAR}}</div>

</body>
</html>
