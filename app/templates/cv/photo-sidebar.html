<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{FULL_NAME}} — CV</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:    #0d1b2a;
    --navy2:   #122240;
    --accent:  #3d7ec8;
    --accent2: #9dbfe8;
    --text:    #1c2b3a;
    --muted:   #64748b;
    --border:  #dde4ef;
  }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 9.1pt;
    color: var(--text);
    background: #fff;
    display: grid;
    grid-template-columns: 246px 1fr;
  }

  /* ── Sidebar ──────────────────────────────────────────────── */
  .sidebar {
    background: var(--navy);
    color: #d8e6f4;
    padding: 22px 18px 16px;
    display: flex;
    flex-direction: column;
  }
  .ps-photo-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
  }
  .ps-photo {
    width: 82px;
    height: 82px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--accent);
    display: block;
  }
  .ps-initials {
    width: 86px;
    height: 86px;
    border-radius: 50%;
    background: var(--navy2);
    border: 3px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24pt;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: 2px;
    flex-shrink: 0;
  }
  .ps-name {
    font-size: 13pt;
    font-weight: 700;
    color: #ffffff;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .ps-headline {
    font-size: 8pt;
    color: var(--accent2);
    text-align: center;
    line-height: 1.35;
    margin-bottom: 4px;
  }
  .ps-location {
    font-size: 7.5pt;
    color: #6e90b0;
    text-align: center;
    margin-bottom: 12px;
  }
  .ps-sec {
    margin-bottom: 10px;
  }
  .ps-sec-title {
    font-size: 6.5pt;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 700;
    color: var(--accent);
    border-bottom: 1px solid #1c3560;
    padding-bottom: 3px;
    margin-bottom: 5px;
  }
  .ps-contact-line {
    font-size: 7.4pt;
    color: #aac0d8;
    margin-bottom: 3px;
    word-break: normal;
    line-height: 1.3;
  }
  .ps-contact-line a {
    color: #aac0d8;
    text-decoration: none;
  }
  .ps-about-text {
    font-size: 7.5pt;
    color: #8aaabf;
    line-height: 1.42;
  }
  .ps-lang-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 8pt;
    color: #b0c6de;
    margin-bottom: 3px;
  }
  .ps-lang-level {
    font-size: 7.5pt;
    color: #6e90b0;
    white-space: nowrap;
    margin-left: 6px;
  }
  .ps-skill-pill {
    display: inline-block;
    background: #192e4a;
    color: #8ab4d8;
    font-size: 7pt;
    padding: 1px 6px;
    border-radius: 10px;
    margin: 2px 2px 2px 0;
  }
  .ps-logo {
    margin-top: auto;
    padding-top: 14px;
    text-align: center;
  }
  .ps-logo .logo-img {
    height: 14px;
    display: inline-block;
    filter: brightness(0) invert(1);
    opacity: 0.3;
  }
  .ps-logo .logo-text-fallback {
    font-size: 6.5pt;
    color: #253d58;
  }

  /* ── Main content ─────────────────────────────────────────── */
  .main {
    background: #fff;
    padding: 22px 24px 16px;
  }
  .main-sec {
    margin-bottom: 12px;
    page-break-inside: avoid;
    break-inside: avoid;
  }
  .main-sec h2 {
    font-size: 8.5pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--navy);
    border-bottom: 1.5px solid var(--accent);
    padding-bottom: 4px;
    margin-bottom: 7px;
    page-break-after: avoid;
  }
  .cv-entry {
    margin-bottom: 8px;
    page-break-inside: avoid;
    break-inside: avoid;
  }
  .cv-entry-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 2px;
  }
  .cv-role, .cv-institution {
    font-weight: 600;
    font-size: 9pt;
    color: var(--text);
  }
  .cv-dates {
    font-size: 7.8pt;
    color: var(--muted);
    white-space: nowrap;
  }
  .cv-org, .cv-degree {
    font-size: 8.5pt;
    color: var(--accent);
    margin-bottom: 2px;
  }
  .cv-type, .cv-location {
    font-size: 8pt;
    color: var(--muted);
  }
  .cv-grade {
    font-size: 8pt;
    color: var(--muted);
    margin-top: 1px;
  }
  .cv-desc {
    font-size: 8.2pt;
    color: #394858;
    margin-top: 2px;
    line-height: 1.34;
  }
  .cv-desc-list {
    padding-left: 14px;
    margin-top: 2px;
    font-size: 8.2pt;
    color: #394858;
    line-height: 1.32;
  }
  .cv-desc-list li { margin-bottom: 1px; }
  .cv-cert-name {
    font-weight: 600;
    font-size: 9pt;
  }
  .cv-issuer {
    font-size: 8.5pt;
    color: var(--muted);
  }
  .cv-empty {
    color: var(--muted);
    font-style: italic;
    font-size: 8.5pt;
  }
  /* ── Print ────────────────────────────────────────────────── */
  @media print {
    @page { size: A4 portrait; margin: 0; }
    body {
      display: grid;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .sidebar { min-height: 297mm; }
    .cv-entry { page-break-inside: avoid; }
    .main-sec { page-break-inside: avoid; }
  }
</style>
</head>
<body>

<aside class="sidebar">

  {{PS_PHOTO_BLOCK}}
  <div class="ps-name">{{FULL_NAME}}</div>
  <div class="ps-headline">{{HEADLINE}}</div>
  <div class="ps-location">{{LOCATION}}</div>

  <div class="ps-sec">
    <div class="ps-sec-title">Contact</div>
    {{PS_CONTACT}}
  </div>

  <div class="ps-sec">
    <div class="ps-sec-title">About</div>
    <p class="ps-about-text">{{SUMMARY}}</p>
  </div>

  <div class="ps-sec">
    <div class="ps-sec-title">Languages</div>
    {{PS_LANGUAGES}}
  </div>

  <div class="ps-sec">
    <div class="ps-sec-title">Skills</div>
    {{PS_SKILLS}}
  </div>

</aside>

<main class="main">
  <div class="main-sec">
    <h2>Experience</h2>
    {{EXPERIENCE}}
  </div>

  <div class="main-sec">
    <h2>Education</h2>
    {{EDUCATION}}
  </div>

  {{PS_PROJECTS_BLOCK}}

  <div class="main-sec">
    <h2>Certifications</h2>
    {{CERTIFICATIONS}}
  </div>

</main>

</body>
</html>
