<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{FULL_NAME}} — CV</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Times New Roman', Times, serif;
    font-size: 10.3pt;
    color: #000;
    background: #fff;
    max-width: 720px;
    margin: 34px auto;
    padding: 0 28px;
    line-height: 1.34;
  }
  h1 { font-size: 18.5pt; text-align: center; letter-spacing: 0.8px; margin-bottom: 3px; }
  .subtitle { text-align: center; font-size: 10pt; color: #333; margin-bottom: 1px; }
  .contact { text-align: center; font-size: 8.8pt; color: #555; margin-bottom: 10px; }
  hr { border: none; border-top: 1.2px solid #000; margin: 8px 0 8px; }
  h2 {
    font-size: 10pt;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    border-bottom: 1px solid #000;
    padding-bottom: 1px;
    margin: 10px 0 5px;
    page-break-after: avoid;
  }
  .cv-entry { margin-bottom: 6px; }
  .cv-entry-header {
    display: flex;
    justify-content: space-between;
    font-weight: bold;
    font-size: 9.8pt;
  }
  .cv-degree, .cv-org { font-style: italic; font-size: 9.5pt; }
  .cv-location, .cv-type { font-size: 8.9pt; color: #444; }
  .cv-desc { margin-top: 2px; font-size: 9.1pt; }
  .cv-cert-name { font-weight: bold; }
  .cv-issuer { font-style: italic; font-size: 9pt; }
  .cv-lang-item { font-size: 9pt; }
  .cv-skill-tag { font-size: 9pt; }
  .cv-skill-tag::after { content: ' · '; }
  .cv-skill-tag:last-child::after { content: ''; }
  .cv-entry { page-break-inside: avoid; break-inside: avoid; }
  .cv-desc-list { margin-top: 2px; padding-left: 15px; font-size: 9.1pt; }
  .cv-desc-list li { margin-bottom: 1px; }
  @media print {
    @page { size: A4; margin: 12mm 15mm; }
    body { margin: 0; padding: 0; max-width: 100%; }
    .footer { display: none; }
  }
</style>
</head>
<body>

<h1>{{FULL_NAME}}</h1>
<div class="subtitle">{{HEADLINE}}</div>
<div class="contact">{{CONTACT_CLEAN_PIPE}}</div>

<hr>

<h2>Professional Summary</h2>
<p>{{SUMMARY}}</p>

<h2>Education</h2>
{{EDUCATION}}

<h2>Professional Experience</h2>
{{EXPERIENCE_FILTERED}}

<h2>Projects</h2>
{{PROJECTS_FULL}}

<h2>Certifications</h2>
{{CERTIFICATIONS}}

<h2>Languages</h2>
<p>{{LANGUAGES}}</p>

<h2>Skills</h2>
<p>{{SKILLS}}</p>

</body>
</html>
