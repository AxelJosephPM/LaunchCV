<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{FULL_NAME}} — CV</title>
<style>
  /* ─── One-Page CV — compact, print-ready, max one A4 page ─── */
  :root {
    --accent: #1a5c96;
    --text:   #111;
    --muted:  #555;
    --line:   #ccc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Arial', 'Helvetica Neue', sans-serif;
    font-size: 9pt;
    color: var(--text);
    background: #fff;
    max-width: 680px;
    margin: 0 auto;
    padding: 18px 24px;
    line-height: 1.32;
  }

  /* ── Header band ── */
  .op-header {
    border-top: 4px solid var(--accent);
    padding-top: 10px;
    margin-bottom: 8px;
  }
  .op-header h1 {
    font-size: 16pt;
    font-weight: 700;
    color: var(--accent);
    display: inline;
  }
  .op-header .op-sep { color: var(--line); margin: 0 8px; }
  .op-header .op-headline {
    font-size: 10pt;
    color: var(--muted);
    display: inline;
  }
  .op-header .op-meta {
    font-size: 8pt;
    color: var(--muted);
    margin-top: 3px;
  }

  /* ── Section headings ── */
  h2 {
    font-size: 8pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    border-bottom: 1px solid var(--accent);
    padding-bottom: 1px;
    margin: 8px 0 5px;
    page-break-after: avoid;
  }

  /* ── Summary ── */
  .op-summary {
    font-size: 8.5pt;
    color: #333;
    line-height: 1.5;
    margin-bottom: 4px;
    /* Clamp to 3 lines max */
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Education compact rows ── */
  .op-edu-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: baseline;
    margin-bottom: 4px;
    font-size: 8.5pt;
  }
  .op-institution { font-weight: 700; }
  .op-degree      { color: var(--muted); flex: 1; }
  .op-dates       { color: var(--muted); white-space: nowrap; font-size: 8pt; }

  /* ── Experience entries ── */
  .op-entry { margin-bottom: 6px; page-break-inside: avoid; break-inside: avoid; }
  .op-entry-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 4px;
  }
  .op-role  { font-weight: 700; font-size: 9pt; }
  .op-dates { font-size: 8pt; color: var(--muted); white-space: nowrap; }
  .op-org   { font-size: 8.5pt; color: var(--accent); }
  .op-desc  {
    font-size: 8pt;
    color: #444;
    margin-top: 2px;
    /* Clamp to 2 lines */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .cv-desc-list, .cv-desc { font-size: 8pt; color: #444; margin-top: 2px; padding-left: 14px; }
  .cv-desc-list li { margin-bottom: 1px; line-height: 1.35; }

  /* ── Skills ── */
  .op-skill {
    display: inline-block;
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 1px 6px;
    font-size: 8pt;
    color: var(--text);
    margin: 2px 2px 2px 0;
  }

  @media print {
    body { margin: 0; padding: 12px 18px; }
    @page { size: A4; margin: 0; }
  }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────── -->
<div class="op-header">
  <h1>{{FULL_NAME}}</h1><span class="op-sep">|</span><span class="op-headline">{{HEADLINE}}</span>
  <div class="op-meta">{{CONTACT_CLEAN_DOT}}</div>
</div>

<!-- ── Profile ─────────────────────────── -->
<h2>Profile</h2>
<p class="op-summary">{{SUMMARY}}</p>

<!-- ── Education ───────────────────────── -->
<h2>Education</h2>
{{EDUCATION_COMPACT}}

<!-- ── Experience (max 2) ──────────────── -->
<h2>Experience</h2>
{{EXPERIENCE_LIMITED}}

<!-- ── Key Skills (max 6) ──────────────── -->
<h2>Key Skills</h2>
{{SKILLS_LIMITED}}

<!-- ── Projects ─────────────────────────── -->
<h2>Projects</h2>
{{PROJECTS_COMPACT}}

<!-- ── Languages ───────────────────────── -->
<h2>Languages</h2>
<p style="font-size:8.5pt;">{{LANGUAGES}}</p>

</body>
</html>
