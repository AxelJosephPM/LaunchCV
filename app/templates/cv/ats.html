<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{FULL_NAME}} — CV (ATS)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11pt;
    color: #000;
    background: #fff;
    max-width: 720px;
    margin: 48px auto;
    padding: 0 32px;
    line-height: 1.5;
  }
  /* ATS-safe: single column, no tables, no icons, no columns */
  h1 { font-size: 16pt; margin-bottom: 4px; }
  .subtitle { font-size: 11pt; margin-bottom: 2px; }
  .contact { font-size: 10pt; color: #222; margin-bottom: 12px; }
  h2 {
    font-size: 11pt;
    text-transform: uppercase;
    border-bottom: 1px solid #000;
    padding-bottom: 2px;
    margin: 16px 0 8px;
  }
  .cv-entry { margin-bottom: 10px; }
  .cv-entry-header { font-weight: bold; font-size: 10.5pt; }
  .cv-dates { font-size: 10pt; }
  .cv-degree, .cv-org { font-size: 10.5pt; }
  .cv-location, .cv-type { font-size: 10pt; }
  .cv-desc { margin-top: 3px; font-size: 10pt; }
  .cv-cert-name { font-weight: bold; }
  .cv-issuer { font-size: 10pt; }
  .cv-lang-item { font-size: 10pt; }
  .cv-skill-tag { font-size: 10pt; }
  .cv-skill-tag::after { content: ', '; }
  .cv-skill-tag:last-child::after { content: ''; }
  .cv-entry { margin-bottom: 10px; page-break-inside: avoid; }
  .footer { font-size: 8pt; color: #aaa; margin-top: 32px; }
  @media print {
    @page { size: A4; margin: 18mm 20mm; }
    body { margin: 0; padding: 0; max-width: 100%; }
  }
</style>
</head>
<body>

<h1>{{FULL_NAME}}</h1>
<div class="subtitle">{{HEADLINE}}</div>
<div class="contact">{{CONTACT_PIPE}}</div>

<h2>Summary</h2>
<p>{{SUMMARY}}</p>

<h2>Education</h2>
{{EDUCATION}}

<h2>Experience</h2>
{{EXPERIENCE}}

<h2>Certifications</h2>
{{CERTIFICATIONS}}

<h2>Languages</h2>
<p>{{LANGUAGES}}</p>

<h2>Skills</h2>
<p>{{SKILLS}}</p>

<p class="footer">Generated by LaunchCV — {{YEAR}}</p>
</body>
</html>
